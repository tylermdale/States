<style>
  :root{
    --ink:#16223f; --ink-soft:#3a4a73;
    --field:#f3f5fb; --paper:#ffffff;
    --blue:#8da9db; --blue-d:#6f8fce; --blue-l:#dae3f3; --blue-l-b:#bcccec;
    --line:#c4cfe6; --gold:#e3a72f; --gold-d:#c4881a; --gold-glow:rgba(227,167,47,.55);
    --shadow:0 1px 2px rgba(22,34,63,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--field); -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;}
  header{flex:none; z-index:30; background:linear-gradient(180deg,#16223f,#1d3057);
    color:#fff; box-shadow:0 2px 14px rgba(16,26,52,.28);}
  .bar{margin:0 auto; max-width:1500px; padding:10px 18px; display:flex; align-items:center; gap:18px; flex-wrap:wrap;}
  .brand{display:flex; align-items:baseline; gap:12px; min-width:0}
  .brand .mark{font-weight:800; letter-spacing:.14em; font-size:24px; line-height:1;}
  .brand .mark b{color:var(--gold)}
  .brand input.title{background:transparent; border:none; color:#fff; font:inherit; font-weight:800;
    letter-spacing:.14em; font-size:24px; text-transform:uppercase; width:auto; min-width:60px;
    max-width:42vw; padding:2px 4px; border-radius:6px;}
  .brand input.title:hover{background:rgba(255,255,255,.08)}
  .brand input.title:focus{outline:2px solid var(--gold); background:rgba(255,255,255,.10)}
  .brand .sub{font-size:11px; letter-spacing:.20em; text-transform:uppercase; color:#aebbdb; white-space:nowrap}
  .spacer{flex:1 1 auto}
  .tabs{display:flex; gap:4px; background:rgba(255,255,255,.08); padding:4px; border-radius:11px}
  .tab{appearance:none; border:none; cursor:pointer; color:#c2cdec; background:transparent; font:inherit;
    font-weight:600; font-size:13px; padding:7px 15px; border-radius:8px; letter-spacing:.02em; white-space:nowrap;
    transition:background .15s,color .15s;}
  .tab:hover{color:#fff}
  .tab[aria-selected="true"]{background:var(--gold); color:#231a05; box-shadow:var(--shadow)}
  .tab .n{opacity:.7; font-weight:700; margin-right:6px}
  .tools{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .btn{appearance:none; cursor:pointer; font:inherit; font-size:13px; font-weight:600; color:#d7e0f6;
    background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14); padding:7px 11px; border-radius:9px;
    display:inline-flex; align-items:center; gap:6px; transition:background .15s,border-color .15s,color .15s;}
  .btn:hover{background:rgba(255,255,255,.15); color:#fff}
  .strip{flex:none; margin:0 auto; max-width:1500px; width:100%; padding:7px 20px 5px; display:flex; align-items:center; gap:16px;}
  .stage h2{margin:0; font-size:15px; letter-spacing:.01em}
  .stage p{margin:1px 0 0; font-size:12px; color:var(--ink-soft)}
  .tip{margin-left:auto; font-size:11.5px; color:var(--ink-soft); white-space:nowrap}
  .tip b{color:var(--ink)}
  .viewport{flex:1 1 auto; min-height:0; width:100%; overflow:hidden; padding:0;
    touch-action:none; overscroll-behavior:contain;}
  .stagewrap{display:none}
  .stagewrap.active{display:block}
  .scaler{transform-origin:0 0; transition:none; will-change:transform;}
  .canvas{position:relative; background:var(--paper); border:1px solid var(--line); border-radius:14px;
    box-shadow:0 6px 26px rgba(22,34,63,.08);}
  .canvas svg{position:absolute; inset:0; width:100%; height:100%; pointer-events:none}
  .canvas svg path{fill:none; stroke:var(--line); stroke-width:1.4}
  .canvas, .canvas *{ -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none;
    -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; touch-action:none; }
  .box{position:absolute; border-radius:5px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center;
    transition:outline-color .12s, box-shadow .12s, opacity .12s;}
  .box.light{background:var(--blue-l); border:1px solid var(--blue-l-b)}
  .box.dark{background:var(--blue); border:1px solid var(--blue-d)}
  .txt{width:100%; text-align:center; padding:0 7px; font-weight:600; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.05; user-select:none;}
  .box.dark .txt{color:#10204a; font-weight:700}
  .box.teambox .txt{color:#8a1024; font-weight:700}
  .box.phbox{background:#eef2fb; border-color:#cdd9ef}
  .box.phbox .txt{color:#61729a; font-weight:600; font-style:italic}
  .box.named .txt{color:#8a1024 !important; font-weight:700; font-style:normal}
  .box.champ{border:1.5px solid var(--gold-d); background:#fff7e8}
  .box.champ .txt{font-weight:800; color:#6a4a06}
  .box.champ::after{content:"\01F3C6"; position:absolute; right:-24px; top:50%; transform:translateY(-50%); font-size:15px;}
  .divline{position:absolute; top:0; width:2px; background:#d33; z-index:2; pointer-events:none; border-radius:1px;}
  /* interactive states */
  .box.clickable{cursor:pointer}
  .box.clickable:hover{box-shadow:0 0 0 2px var(--blue-d), var(--shadow)}
  .box.picked{outline:3px solid var(--gold); outline-offset:0; z-index:4}
  .box.picked.locked{outline-color:var(--gold-d); box-shadow:0 0 11px var(--gold-glow), var(--shadow)}
  .box.lost{opacity:.4}
  .box.lost .txt{text-decoration:line-through; text-decoration-thickness:1px}
  .badge{position:absolute; right:-9px; top:-9px; z-index:8; min-width:18px; height:18px; padding:0 2px;
    border-radius:9px; background:var(--gold); color:#231a05; font:800 11px/18px ui-sans-serif,system-ui,sans-serif;
    text-align:center; display:none; box-shadow:0 1px 3px rgba(0,0,0,.35); pointer-events:none;}
  .box.picked .badge{display:block}
  .box.locked .badge{background:var(--gold-d); color:#fff}
  @keyframes pls{0%{outline-color:#d33}60%{outline-color:#d33}100%{outline-color:var(--gold-d)}}
  .box.pulse{outline:3px solid #d33; animation:pls .5s ease}
  .gamecirc{position:absolute; z-index:6; pointer-events:auto; cursor:pointer; transform:translate(-50%,-50%);
    width:28px; height:28px; border-radius:50%; background:#7f879c; border:2px solid #fff;
    box-shadow:0 1px 4px rgba(22,34,63,.45); color:#fff; font:800 14px ui-sans-serif,system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; letter-spacing:-.02em;
    transition:transform .08s, background .12s;}
  .gamecirc:hover{background:var(--gold-d); transform:translate(-50%,-50%) scale(1.12)}
  /* game-detail popup */
  .gpop{position:fixed; z-index:100; display:none; min-width:170px; max-width:240px;
    background:#fff; border:1px solid var(--line); border-radius:12px; box-shadow:0 10px 34px rgba(16,26,52,.28);
    padding:11px 13px 12px; font-size:13px; color:var(--ink);}
  .gpop-h{font-weight:800; font-size:14px; letter-spacing:.02em; margin-bottom:7px; padding-bottom:7px;
    border-bottom:1px solid var(--line); color:#16223f;}
  .gpop-h .cc{display:inline-flex; align-items:center; justify-content:center; width:22px;height:22px;border-radius:50%;
    background:#7f879c; color:#fff; font-size:11px; font-weight:800; margin-right:8px; vertical-align:middle;}
  .gpop-r{display:flex; justify-content:space-between; gap:14px; padding:3px 0;}
  .gpop-r span{color:var(--ink-soft); font-weight:600}
  .gpop-r b{font-weight:700; text-align:right}
  .gpop-r b.tbd{color:#9aa7c4; font-weight:600; font-style:italic}
  .gpop-teams{margin-top:6px; padding-top:7px; border-top:1px solid var(--line); font-size:12.5px}
  .gpop-teams .vs{display:flex; align-items:center; gap:8px; justify-content:space-between}
  .gpop-teams .t{font-weight:700; color:var(--ink)}
  .gpop-teams .t.tbd{color:#9aa7c4; font-weight:600; font-style:italic}
  .gpop-teams .mid{color:#9aa7c4; font-size:11px; font-weight:700}
  .gpop::before{content:""; position:absolute; top:-7px; left:var(--ax,50%); transform:translateX(-50%);
    border:7px solid transparent; border-top:0; border-bottom-color:#fff; filter:drop-shadow(0 -1px 0 var(--line));}
  .gpop.below::before{top:auto; bottom:-7px; border-bottom:0; border-top-color:#fff; filter:drop-shadow(0 1px 0 var(--line));}
  /* custom confirm modal (native confirm() is blocked in some viewers) */
  .confirmov{position:fixed; inset:0; z-index:300; display:none; align-items:center; justify-content:center;
    background:rgba(16,26,52,.55); padding:22px;}
  .confirmov.show{display:flex}
  .confirmbox{background:#fff; border-radius:14px; box-shadow:0 18px 50px rgba(16,26,52,.42); max-width:340px; width:100%;
    padding:20px 20px 16px;}
  .confirmbox h3{margin:0 0 8px; font-size:16px; color:var(--ink);}
  .confirmbox p{margin:0 0 18px; font-size:13.5px; color:var(--ink-soft); line-height:1.45;}
  .confirmbox .crow{display:flex; gap:10px; justify-content:flex-end;}
  .confirmbox button{appearance:none; border:none; cursor:pointer; font:inherit; font-weight:700; font-size:14px;
    padding:9px 17px; border-radius:9px;}
  .cbtn-cancel{background:#eef1f8; color:var(--ink);}
  .cbtn-cancel:hover{background:#e3e8f4}
  .cbtn-reset{background:#d33; color:#fff;}
  .cbtn-reset:hover{background:#c22}
</style>
</head>

<script>
(function(){
  "use strict";
  var DATA=JSON.parse(document.getElementById('bracket-data').textContent);
  var PXPI=DATA.pxpi, PAD=14, STATE_KEY='states_bracket_v4';
  var title=(DATA.baked&&DATA.title)?DATA.title:'STATES';
  var canvasDims={};
  function gid(s,id){return s+'-'+id;}

  /* ===== global indexes across both slides ===== */
  var byGidData={};                 // gid -> data box
  var gameObj={};                   // gameNumber -> {s, gid, parents:[gid,gid]}
  ['1','2'].forEach(function(s){
    var boxes=DATA.slides[s].boxes, byid={};
    boxes.forEach(function(b){ byid[b.id]=b; byGidData[gid(s,b.id)]=b; });
    boxes.forEach(function(b){
      if(b.game){ gameObj[b.game]={s:s, gid:gid(s,b.id),
        parents:(b.parents||[]).map(function(pid){return gid(s,pid);})}; }
    });
  });

  /* ===== state ===== */
  var pick={}, lock={};
  function loadState(){ try{ var r=localStorage.getItem(STATE_KEY); if(!r) return; var o=JSON.parse(r);
    if(o.t) title=o.t;
    if(o.p && typeof o.p==='object'){ Object.keys(o.p).forEach(function(g){ pick[g]=o.p[g]; }); }
    if(o.l && o.l.length){ o.l.forEach(function(g){ lock[g]=true; }); }
  }catch(e){} }
  loadState();
  function persist(){ try{ localStorage.setItem(STATE_KEY, JSON.stringify({
    t:title, p:pick, l:Object.keys(lock).filter(function(g){return lock[g];})
  })); }catch(e){} }

  /* ===== resolver (functional; memoised per render) ===== */
  var memoT, memoW, PH=/^([WL])(\d+)$/;
  function winnerTeam(G){ if(memoW.hasOwnProperty(G)) return memoW[G];
    memoW[G]=null; var g=gameObj[G]; var p=g?pick[G]:null;
    var r = p ? teamOf(p) : null; memoW[G]=r; return r; }
  function loserTeam(G){ var g=gameObj[G]; var p=g?pick[G]:null; if(!p) return null;
    var other = g.parents[0]===p ? g.parents[1] : g.parents[0]; return teamOf(other); }
  function teamOf(gd){ if(memoT.hasOwnProperty(gd)) return memoT[gd];
    memoT[gd]=null; var b=byGidData[gd]; var r=null;
    if(b){ if(b.leaf){ var m=PH.exec(b.content||'');
        if(m){ r = m[1]==='W' ? winnerTeam(+m[2]) : loserTeam(+m[2]); }
        else { r = b.content||null; } }
      else if(b.game){ r=winnerTeam(b.game); } }
    memoT[gd]=r; return r; }

  var viewport=document.getElementById('viewport');
  var gpop=document.getElementById('gpop');
  var META=[];                      // per interactive/display box

  function buildSlide(s){
    var sd=DATA.slides[s];
    var W=Math.round(sd.maxx*PXPI)+PAD*2+8, H=Math.round(sd.maxy*PXPI)+PAD*2+8;
    canvasDims[s]={w:W,h:H};
    var byid={}; sd.boxes.forEach(function(b){ byid[b.id]=b; });

    var wrap=document.createElement('div');
    wrap.className='stagewrap'+(s==='1'?' active':''); wrap.dataset.s=s;
    var scaler=document.createElement('div'); scaler.className='scaler';
    var canvas=document.createElement('div'); canvas.className='canvas';
    canvas.style.width=W+'px'; canvas.style.height=H+'px';

    var NS='http://www.w3.org/2000/svg';
    var svg=document.createElementNS(NS,'svg'); svg.setAttribute('viewBox','0 0 '+W+' '+H);
    sd.edges.forEach(function(e){
      var p=byid[e[0]], c=byid[e[1]]; if(!p||!c) return;
      var px=PAD+(p.x+p.w)*PXPI, py=PAD+(p.y+p.h/2)*PXPI;
      var cx=PAD+c.x*PXPI, cy=PAD+(c.y+c.h/2)*PXPI, mx=(px+cx)/2;
      var path=document.createElementNS(NS,'path');
      path.setAttribute('d','M '+px+' '+py+' H '+mx+' V '+cy+' H '+cx);
      svg.appendChild(path);
    });
    canvas.appendChild(svg);

    sd.boxes.forEach(function(b){
      var id=gid(s,b.id);
      var box=document.createElement('div');
      var cls='box '+(b.dark?'dark':'light'); if(b.champ) cls+=' champ';
      box.className=cls;
      box.style.left=(PAD+b.x*PXPI)+'px'; box.style.top=(PAD+b.y*PXPI)+'px';
      box.style.width=(b.w*PXPI)+'px'; box.style.height=(b.h*PXPI)+'px';
      var fs=Math.max(10.5, Math.min(13.5, b.h*PXPI*0.48));

      var txt=document.createElement('div'); txt.className='txt';
      txt.style.fontSize=fs.toFixed(1)+'px';
      box.appendChild(txt);
      var badge=document.createElement('span'); badge.className='badge'; box.appendChild(badge);

      // game circle (info popup)
      if(b.game){
        var pr=byid[b.parents[0]];
        var jx=PAD+((pr.x+pr.w) + (b.x-(pr.x+pr.w))*0.42)*PXPI, jy=PAD+(b.y+b.h/2)*PXPI;
        var gc=document.createElement('div'); gc.className='gamecirc';
        gc.style.left=jx+'px'; gc.style.top=jy+'px'; gc.textContent=b.game;
        gc.dataset.g=b.game; gc.dataset.gd=b.gd||''; gc.dataset.gt=b.gt||''; gc.dataset.gl=b.gl||'';
        gc.addEventListener('click',function(ev){ ev.stopPropagation(); openPop(gc); });
        canvas.appendChild(gc);
      }

      // advance target = game that this box feeds into (child game)
      var cb = (b.child>=0) ? byid[b.child] : null;
      var ag = (cb && cb.game) ? cb.game : 0;
      var isPh = PH.test(b.content||'');
      var m={ s:s, gid:id, el:box, txt:txt, badge:badge, b:b,
              leaf:!!b.leaf, dark:!!b.dark, champ:!!b.champ, isPh:isPh, ag:ag };
      META.push(m);
      if(ag){ attachPress(box, m); }

      canvas.appendChild(box);
    });
    var DIVG={'1':60,'2':84}[s];
    if(DIVG){
      var gL=null; for(var qi=0;qi<sd.boxes.length;qi++){ if(sd.boxes[qi].game===DIVG){ gL=sd.boxes[qi]; break; } }
      if(gL){
        var prL=byid[gL.parents[0]];
        var circL=PAD+((prL.x+prL.w)+(gL.x-(prL.x+prL.w))*0.42)*PXPI;
        var blL=PAD+gL.x*PXPI;
        var vl=document.createElement('div'); vl.className='divline';
        vl.style.left=((circL+14+blL)/2)+'px'; vl.style.height=H+'px';
        canvas.appendChild(vl);
      }
    }
    scaler.appendChild(canvas); wrap.appendChild(scaler); viewport.appendChild(wrap);
  }

  /* ===== press handling (tap = pick winner, long-press = lock) ===== */
  var lastTouch=0;
  function attachPress(el,m){
    var timer=null, sx=0, sy=0, moved=false, longed=false;
    function begin(x,y){ sx=x; sy=y; moved=false; longed=false;
      timer=setTimeout(function(){ longed=true; timer=null; doPress(m,'long'); },480); }
    function movchk(x,y){ if(timer && (Math.abs(x-sx)>8||Math.abs(y-sy)>8)){ clearTimeout(timer); timer=null; moved=true; } }
    function finish(){ if(timer){ clearTimeout(timer); timer=null; } if(!moved && !longed){ doPress(m,'tap'); } }
    el.addEventListener('touchstart',function(e){ if(e.touches.length>1){ if(timer){clearTimeout(timer);timer=null;} moved=true; return; } var t=e.touches[0]; begin(t.clientX,t.clientY); },{passive:true});
    el.addEventListener('touchmove',function(e){ if(e.touches.length>1){ if(timer){clearTimeout(timer);timer=null;} moved=true; return; } var t=e.touches[0]; movchk(t.clientX,t.clientY); },{passive:true});
    el.addEventListener('touchend',function(e){ lastTouch=Date.now(); finish(); });
    el.addEventListener('touchcancel',function(){ if(timer){clearTimeout(timer);timer=null;} });
    el.addEventListener('mousedown',function(e){ if(e.button!==0) return;
      if(Date.now()-lastTouch<600) return;          // ignore synthetic mouse after touch
      begin(e.clientX,e.clientY);
      var mm=function(ev){ movchk(ev.clientX,ev.clientY); };
      var mu=function(ev){ document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); finish(); };
      document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
    });
  }
  function doPress(m,kind){
    var G=m.ag; if(!G) return;
    if(teamOf(m.gid)==null) return;                 // this slot isn't decided yet
    if(kind==='long'){
      if(pick[G]===m.gid && lock[G]){ delete lock[G]; }
      else { pick[G]=m.gid; lock[G]=true; }
      if(navigator.vibrate){ try{navigator.vibrate(18);}catch(e){} }
    } else {
      if(lock[G]){ pulse(m.el); return; }            // locked: taps ignored
      if(pick[G]===m.gid){ delete pick[G]; }         // tap the current winner again -> revert
      else { pick[G]=m.gid; }
    }
    persist(); applyState();
  }
  function pulse(el){ el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse');
    setTimeout(function(){ el.classList.remove('pulse'); },520); }

  /* ===== render current state onto boxes ===== */
  function applyState(){
    memoT={}; memoW={};
    for(var i=0;i<META.length;i++){
      var m=META[i], resolved=teamOf(m.gid);
      var disp = (resolved!=null) ? resolved : (m.b.content||'');
      if(m.txt.textContent!==disp) m.txt.textContent=disp;
      m.txt.title = (resolved!=null) ? resolved : (m.b.full||disp||'');
      var el=m.el;
      // any box currently showing a real team name -> red 'named' font; placeholders keep their look
      if(resolved!=null){ el.classList.add('named'); el.classList.remove('phbox'); }
      else { el.classList.remove('named'); if(m.isPh && !m.dark && !m.champ){ el.classList.add('phbox'); } }
      el.classList.remove('picked','lost','locked');
      m.badge.textContent='';
      if(m.ag){
        var p=pick[m.ag];
        if(p){
          if(p===m.gid){ el.classList.add('picked');
            if(lock[m.ag]){ el.classList.add('locked'); m.badge.textContent='\uD83D\uDD12'; }
            else { m.badge.textContent='\u2713'; } }
          else { el.classList.add('lost'); }
        }
        el.classList.toggle('clickable', resolved!=null);
      }
    }
  }

  /* ===== reset (keep locked games + their inputs) ===== */
  function keepSet(){
    var keep={};
    function anc(G){ if(keep[G]) return; keep[G]=1; var g=gameObj[G]; if(!g) return;
      g.parents.forEach(function(pg){ var b=byGidData[pg]; if(!b) return;
        if(b.game){ anc(b.game); }
        else if(b.leaf){ var mm=PH.exec(b.content||''); if(mm) anc(+mm[2]); } }); }
    Object.keys(lock).forEach(function(G){ if(lock[G]) anc(+G); });
    return keep;
  }
  function doReset(){
    var keep=keepSet();
    Object.keys(pick).forEach(function(G){ if(!keep[G]) delete pick[G]; });
    closePop(); persist(); applyState();
  }
  var confirmov=document.getElementById('confirmov'), confirmmsg=document.getElementById('confirmmsg');
  document.getElementById('clear').onclick=function(ev){
    ev.stopPropagation();
    if(!Object.keys(pick).length){ return; }
    var nLock=Object.keys(lock).filter(function(g){return lock[g];}).length;
    confirmmsg.textContent = nLock
      ? ('This clears all your winner picks. '+nLock+' locked game'+(nLock>1?'s':'')+' will be kept.')
      : 'This clears all your winner picks and returns the bracket to the start.';
    confirmov.classList.add('show');
  };
  document.getElementById('cbCancel').onclick=function(ev){ ev.stopPropagation(); confirmov.classList.remove('show'); };
  document.getElementById('cbReset').onclick=function(ev){ ev.stopPropagation(); confirmov.classList.remove('show'); doReset(); };
  confirmov.addEventListener('click',function(e){ if(e.target===confirmov) confirmov.classList.remove('show'); });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') confirmov.classList.remove('show'); });

  /* ===== game-detail popup ===== */
  function row(label,val){ var tbd=!val;
    return '<div class="gpop-r"><span>'+label+'</span><b'+(tbd?' class="tbd"':'')+'>'+(val||'TBD')+'</b></div>'; }
  function teamRow(G){
    var g=gameObj[G]; if(!g) return '';
    var a=teamOf(g.parents[0]), b=teamOf(g.parents[1]);
    function cell(t){ return t!=null ? '<span class="t">'+esc(t)+'</span>' : '<span class="t tbd">TBD</span>'; }
    return '<div class="gpop-teams"><div class="vs">'+cell(a)+'<span class="mid">vs</span>'+cell(b)+'</div></div>';
  }
  function esc(s){ return (''+s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
  function openPop(gc){
    var g=gc.dataset.g, gd=gc.dataset.gd, gt=gc.dataset.gt, gl=gc.dataset.gl;
    memoT={}; memoW={};
    gpop.innerHTML='<div class="gpop-h"><span class="cc">'+g+'</span>Game '+g+'</div>'
      + row('Date',gd) + row('Time',gt) + row('Field',gl) + teamRow(+g);
    gpop.style.display='block'; gpop.classList.remove('below');
    var r=gc.getBoundingClientRect();
    var pw=gpop.offsetWidth, ph=gpop.offsetHeight;
    var cx=r.left+r.width/2;
    var left=cx-pw/2, top=r.bottom+10;
    if(top+ph>window.innerHeight-8){ top=r.top-ph-10; gpop.classList.add('below'); }
    left=Math.max(8, Math.min(window.innerWidth-pw-8, left));
    gpop.style.left=left+'px'; gpop.style.top=top+'px';
    gpop.style.setProperty('--ax',(cx-left)+'px');
  }
  function closePop(){ gpop.style.display='none'; }
  document.addEventListener('click',closePop);
  gpop.addEventListener('click',function(e){ e.stopPropagation(); });
  viewport.addEventListener('scroll',closePop);
  window.addEventListener('resize',closePop);

  /* ===== tabs ===== */
  var tabs=document.getElementById('tabs');
  var currentStage='1';
  function selectStage(s){
    currentStage=s; closePop();
    tabs.querySelectorAll('.tab').forEach(function(t){ t.setAttribute('aria-selected', t.dataset.s===s?'true':'false'); });
    viewport.querySelectorAll('.stagewrap').forEach(function(w){ w.classList.toggle('active', w.dataset.s===s); });
    resetView();
  }
  tabs.addEventListener('click',function(e){ var t=e.target.closest('.tab'); if(t) selectStage(t.dataset.s); });

  /* ===== transform-based pan + pinch-zoom (single GPU transform = no jitter) ===== */
  var MINZ=0.12, MAXZ=4, DEFZ=0.45, zoom=DEFZ, panX=0, panY=0;
  function minZoom(){ var d=canvasDims[currentStage]; return d ? Math.min(MAXZ, viewport.clientHeight/d.h) : MINZ; }
  function clampZ(z){ return Math.max(minZoom(), Math.min(MAXZ, z)); }
  function activeScaler(){ var w=viewport.querySelector('.stagewrap.active'); return w?w.querySelector('.scaler'):null; }
  function clampPan(){
    var d=canvasDims[currentStage]; if(!d) return;
    var vw=viewport.clientWidth, vh=viewport.clientHeight, cw=d.w*zoom, ch=d.h*zoom, M=40;
    var loX=Math.min(0,vw-cw)-M, hiX=Math.max(0,vw-cw)+M;
    var loY=Math.min(0,vh-ch)-M, hiY=Math.max(0,vh-ch)+M;
    panX=Math.max(loX,Math.min(hiX,panX)); panY=Math.max(loY,Math.min(hiY,panY));
  }
  function applyTransform(){
    clampPan(); var sc=activeScaler();
    if(sc) sc.style.transform='translate('+panX.toFixed(2)+'px,'+panY.toFixed(2)+'px) scale('+zoom+')';
  }
  function resetView(){ zoom=clampZ(DEFZ); panX=0; panY=0; applyTransform(); }

  (function(){
    var mode=null, lastX=0, lastY=0, pD0=0, pZ0=1, pCx=0, pCy=0;
    function vpR(){ return viewport.getBoundingClientRect(); }
    function midCanvas(a,b,r){ return {fx:(a.clientX+b.clientX)/2-r.left, fy:(a.clientY+b.clientY)/2-r.top}; }
    viewport.addEventListener('touchstart',function(e){
      closePop();
      if(e.touches.length===1){ mode='pan'; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
      else if(e.touches.length>=2){
        var r=vpR(),a=e.touches[0],b=e.touches[1], m=midCanvas(a,b,r);
        pD0=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY)||1;
        pZ0=zoom; pCx=(m.fx-panX)/zoom; pCy=(m.fy-panY)/zoom;   // canvas point under the pinch center
        mode='pinch'; e.preventDefault();
      }
    },{passive:false});
    viewport.addEventListener('touchmove',function(e){
      if(mode==='pinch' && e.touches.length>=2){ e.preventDefault();
        var r=vpR(),a=e.touches[0],b=e.touches[1], m=midCanvas(a,b,r);
        var d=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
        zoom=clampZ(pZ0*(d/pD0));
        panX=m.fx-zoom*pCx; panY=m.fy-zoom*pCy;                 // keep that point under the fingers
        applyTransform();
      } else if(mode==='pan' && e.touches.length===1){
        var t=e.touches[0], dx=t.clientX-lastX, dy=t.clientY-lastY;
        if(dx||dy){ panX+=dx; panY+=dy; lastX=t.clientX; lastY=t.clientY; applyTransform(); e.preventDefault(); }
      }
    },{passive:false});
    function endp(e){
      if(!e.touches||e.touches.length===0){ mode=null; }
      else if(e.touches.length===1){ mode='pan'; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
    }
    viewport.addEventListener('touchend',endp); viewport.addEventListener('touchcancel',endp);

    // desktop: wheel/trackpad pans; Ctrl/Cmd + wheel zooms at the cursor
    viewport.addEventListener('wheel',function(e){
      e.preventDefault(); var r=vpR();
      if(e.ctrlKey||e.metaKey){ closePop();
        var fx=e.clientX-r.left, fy=e.clientY-r.top, cx=(fx-panX)/zoom, cy=(fy-panY)/zoom;
        zoom=clampZ(zoom*(e.deltaY<0?1.10:0.909));
        panX=fx-zoom*cx; panY=fy-zoom*cy; applyTransform();
      } else { panX-=e.deltaX; panY-=e.deltaY; applyTransform(); }
    },{passive:false});

    // desktop: click-drag to pan (ignored right after touch, and for genuine taps)
    var drag=false, dsx=0, dsy=0;
    viewport.addEventListener('mousedown',function(e){ if(e.button!==0) return;
      if(Date.now()-lastTouch<800) return; drag=true; dsx=e.clientX; dsy=e.clientY; });
    window.addEventListener('mousemove',function(e){ if(!drag) return;
      var dx=e.clientX-dsx, dy=e.clientY-dsy; if(dx||dy){ panX+=dx; panY+=dy; dsx=e.clientX; dsy=e.clientY; applyTransform(); } });
    window.addEventListener('mouseup',function(){ drag=false; });
    window.addEventListener('resize',function(){ zoom=clampZ(zoom); applyTransform(); });
  })();

  ['1','2'].forEach(buildSlide);
  applyState();
  resetView();
})();
</script>
</body>
</html>
